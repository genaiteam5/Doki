<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOKI — eyes wall</title>
<style>
  :root{
    --mint:#3DAB9B;
    --ivory:#EDE7D9;
    --black:#131313;
    --darkgray:#33312A;
    --gray:#B3ADA0;
    --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--black);}

  /* asymmetric full-bleed grid — column / row lines sit on the
     block boundaries read off the reference image */
  .collage{
    width:100vw;height:100vh;
    display:grid;
    /* x lines: 0 21 33.33 40 66.67 72 88 100 */
    grid-template-columns:21fr 12.33fr 6.67fr 26.67fr 5.33fr 16fr 12fr;
    /* y lines: 0 33 59 64 70 100 */
    grid-template-rows:33fr 26fr 5fr 6fr 30fr;
  }
  .tile{position:relative;overflow:hidden;}
  .tile svg{width:100%;height:100%;display:block;}

  /* grid placement: row-start / col-start / row-end / col-end */
  .A{grid-area:1/1/2/3;background:var(--mint);}
  .B{grid-area:1/3/2/5;background:var(--ivory);}
  .C{grid-area:1/5/2/8;background:var(--black);}
  .D{grid-area:2/1/4/4;background:var(--black);}
  .E{grid-area:2/4/6/6;background:var(--gray);}
  .F{grid-area:2/7/3/8;background:var(--mint);}
  .G{grid-area:4/1/6/2;background:var(--black);}
  .H{grid-area:4/2/6/4;background:var(--ivory);}
  .I{grid-area:5/7/6/8;background:var(--darkgray);}
  .fill1{grid-area:2/6/6/7;background:var(--black);}
  .fill2{grid-area:3/7/5/8;background:var(--black);}
</style>
</head>
<body>
  <main class="collage">

    <!-- A · mint · white pills + black diamonds -->
    <div class="tile A">
      <svg viewBox="0 0 100 56" preserveAspectRatio="xMidYMid meet">
        <rect x="30" y="11" width="14" height="34" rx="7" fill="#fff"/>
        <rect x="56" y="11" width="14" height="34" rx="7" fill="#fff"/>
        <rect x="31.5" y="22.5" width="11" height="11" fill="#131313" transform="rotate(45 37 28)"/>
        <rect x="57.5" y="22.5" width="11" height="11" fill="#131313" transform="rotate(45 63 28)"/>
      </svg>
    </div>

    <!-- B · ivory · white ellipses + black barrels -->
    <div class="tile B">
      <svg viewBox="0 0 100 56" preserveAspectRatio="xMidYMid meet">
        <ellipse cx="28" cy="28" rx="21" ry="13" fill="#fff"/>
        <ellipse cx="72" cy="28" rx="21" ry="13" fill="#fff"/>
        <rect x="20" y="13" width="16" height="30" rx="5" fill="#131313"/>
        <rect x="64" y="13" width="16" height="30" rx="5" fill="#131313"/>
      </svg>
    </div>

    <!-- C · black · white rects + teal-ring pupils -->
    <div class="tile C">
      <svg viewBox="0 0 100 56" preserveAspectRatio="xMidYMid meet">
        <rect x="30.5" y="10" width="13" height="36" rx="2" fill="#fff"/>
        <rect x="56.5" y="10" width="13" height="36" rx="2" fill="#fff"/>
        <circle cx="37" cy="27" r="7.5" fill="#3DAB9B"/>
        <circle cx="63" cy="27" r="7.5" fill="#3DAB9B"/>
        <circle cx="37" cy="27" r="4" fill="#131313"/>
        <circle cx="63" cy="27" r="4" fill="#131313"/>
      </svg>
    </div>

    <!-- D · black · white domes + teal triangles -->
    <div class="tile D">
      <svg viewBox="0 0 100 44" preserveAspectRatio="xMidYMid meet">
        <path d="M8 28 A22 13 0 0 1 52 28 Z" fill="#fff"/>
        <path d="M48 28 A22 13 0 0 1 92 28 Z" fill="#fff"/>
        <polygon points="24,16 36,16 30,28" fill="#3DAB9B"/>
        <polygon points="64,16 76,16 70,28" fill="#3DAB9B"/>
      </svg>
    </div>

    <!-- E · gray · the giant double eyes -->
    <div class="tile E">
      <svg viewBox="0 0 100 118" preserveAspectRatio="xMidYMid meet">
        <ellipse cx="25.5" cy="59" rx="24" ry="46" fill="#fff"/>
        <ellipse cx="74.5" cy="59" rx="24" ry="46" fill="#fff"/>
        <ellipse cx="25.5" cy="68" rx="7" ry="16" fill="#131313"/>
        <ellipse cx="74.5" cy="68" rx="7" ry="16" fill="#131313"/>
      </svg>
    </div>

    <!-- F · mint · almonds + diamonds -->
    <div class="tile F">
      <svg viewBox="0 0 100 122" preserveAspectRatio="xMidYMid meet">
        <path d="M8 61 Q28 46 48 61 Q28 76 8 61 Z" fill="#fff"/>
        <path d="M52 61 Q72 46 92 61 Q72 76 52 61 Z" fill="#fff"/>
        <rect x="22" y="55" width="12" height="12" fill="#131313" transform="rotate(45 28 61)"/>
        <rect x="66" y="55" width="12" height="12" fill="#131313" transform="rotate(45 72 61)"/>
      </svg>
    </div>

    <!-- G · black · half-bowl eyes (white rim + teal) -->
    <div class="tile G">
      <svg viewBox="0 0 100 96" preserveAspectRatio="xMidYMid meet">
        <path d="M-2 52 A24 24 0 0 1 46 52 Z" fill="#fff"/>
        <path d="M4 52 A18 18 0 0 1 40 52 Z" fill="#3DAB9B"/>
        <path d="M48 52 A24 24 0 0 1 96 52 Z" fill="#fff"/>
        <path d="M54 52 A18 18 0 0 1 90 52 Z" fill="#3DAB9B"/>
      </svg>
    </div>

    <!-- H · ivory · white eggs + small black pupils -->
    <div class="tile H">
      <svg viewBox="0 0 100 106" preserveAspectRatio="xMidYMid meet">
        <ellipse cx="33" cy="53" rx="16" ry="27" fill="#fff"/>
        <ellipse cx="67" cy="53" rx="16" ry="27" fill="#fff"/>
        <circle cx="36" cy="47" r="5" fill="#131313"/>
        <circle cx="64" cy="47" r="5" fill="#131313"/>
      </svg>
    </div>

    <!-- I · darkgray · capsule bars + teal dots -->
    <div class="tile I">
      <svg viewBox="0 0 100 141" preserveAspectRatio="xMidYMid meet">
        <rect x="9" y="64.5" width="36" height="13" rx="6.5" fill="#fff"/>
        <rect x="55" y="64.5" width="36" height="13" rx="6.5" fill="#fff"/>
        <circle cx="16" cy="71" r="6.5" fill="#3DAB9B"/>
        <circle cx="62" cy="71" r="6.5" fill="#3DAB9B"/>
      </svg>
    </div>

    <!-- black filler regions so the grid is gap-free -->
    <div class="tile fill1"></div>
    <div class="tile fill2"></div>

  </main>
</body>
</html>
